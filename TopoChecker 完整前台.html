</div>)}

function TabEvidence({issue}){
  const ev=issue.evidence;
  if(!ev)return<div className="empty"><div className="ei">○</div><div className="et">暂无证据数据</div></div>;
  return(<div>
    <div className="ev-compare">
      <div className="ev-cell expected"><div className="ev-lbl">期望值</div><div className="ev-val">{ev.expected_value}</div></div>
      <div className="ev-cell mid">{ev.comparison_operator}</div>
      <div className="ev-cell actual"><div className="ev-lbl">实际值</div><div className="ev-val">{ev.actual_value}</div></div>
    </div>
    <div className="d-block"><h4>证据元数据</h4><div className="kv-grid">
      <span className="kk">证据类型</span><span className="vv">{ev.evidence_type}</span>
      <span className="kk">字段名</span><span className="vv">{ev.field_name}</span>
    </div></div>
    {ev.related_values&&Object.keys(ev.related_values).length>0&&<div className="d-block"><h4>相关值</h4><div className="kv-grid">{Object.entries(ev.related_values).map(([k,v])=><React.Fragment key={k}><span className="kk">{k}</span><span className="vv">{v}</span></React.Fragment>)}</div></div>}
    {ev.raw_snapshot&&<div className="d-block"><Collapsible title="原始快照"><div className="mono-box">{JSON.stringify(ev.raw_snapshot,null,2)}</div></Collapsible></div>}
  </div>);
}

function TabContext({reviewCtx,isLoading}){
  if(isLoading)return<div style={{display:'flex',gap:8,padding:'12px 0',color:'var(--text2)',fontSize:12}}><span className="spinner"/><span>正在加载上下文…</span></div>;
  if(!reviewCtx)return<div className="empty"><div className="ei">○</div><div className="et">暂无上下文信息</div></div>;
  const {related_devices,related_ports,related_links}=reviewCtx;
  return(<div>
    {related_devices?.length>0&&<div className="d-block"><h4>关联设备 ({related_devices.length})</h4><div className="ctx-list">{related_devices.map(d=><div key={d.id} className="ctx-row"><span className="ctx-dot unknown"/><span className="ctx-name">{d.id}</span><span className="ctx-meta">{d.role}</span><span className="ctx-meta" style={{marginLeft:8}}>{d.firmware}</span></div>)}</div></div>}
    {related_ports?.length>0&&<div className="d-block"><h4>关联端口 ({related_ports.length})</h4><div className="ctx-list">{related_ports.map((p,i)=><div key={i} className="ctx-row"><span className={`ctx-dot ${STATUS_DOT[p.status]||'unknown'}`}/><span className="ctx-name">{p.device} · {p.port}</span><span className="ctx-meta">{p.speed}</span><span className="ctx-meta" style={{marginLeft:8}}>{p.peer}</span></div>)}</div></div>}
    {related_links?.length>0&&<div className="d-block"><h4>关联链路 ({related_links.length})</h4><div className="ctx-list">{related_links.map(l=><div key={l.id} className="ctx-row"><span className={`ctx-dot ${STATUS_DOT[l.status]||'unknown'}`}/><span className="ctx-name">{l.from} → {l.to}</span><span className="ctx-meta">{l.utilization}</span></div>)}</div></div>}
    {reviewCtx.topology_snapshot&&<div className="d-block"><Collapsible title="拓扑快照"><div className="mono-box">{JSON.stringify(reviewCtx.topology_snapshot,null,2)}</div></Collapsible></div>}
  </div>);
}

function TabDiff({runDiffSummary,issueDiffItems}){
  const ds=runDiffSummary;const diffs=issueDiffItems||[];
  return(<div>
    {ds?<>
      <span className={`trend-badge ${ds.trend}`}>{TREND_LABEL[ds.trend]||ds.trend}</span>
      <div className="diff-stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:12}}>
        <div className="diff-stat"><div className={`dsv ${ds.delta>0?'up':ds.delta<0?'dn':'eq'}`}>{ds.total_before}</div><div className="dsl">变更前</div></div>
        <div className="diff-stat"><div className={`dsv ${ds.delta>0?'up':ds.delta<0?'dn':'eq'}`}>{ds.total_after}</div><div className="dsl">变更后</div></div>
        <div className="diff-stat"><div className={`dsv ${ds.delta>0?'up':ds.delta<0?'dn':'eq'}`}>{ds.delta>0?'+':''}{ds.delta}</div><div className="dsl">变化量</div></div>
      </div>
    </>:<div style={{fontSize:12,color:'var(--text2)',marginBottom:12}}>当前无复检差异数据</div>}
    <div className="d-block"><h4>字段级变化</h4>
      <div style={{padding:'4px 8px',background:'var(--bg3)',borderRadius:4,fontSize:10,color:'var(--text2)',marginBottom:8}}>⚠ 基线切换功能 UI 占位 — 后端 getIssueDiff() 待实现</div>
      {diffs.length===0?<div style={{fontSize:12,color:'var(--text2)'}}>无字段级变化</div>:diffs.map((d,i)=>(
        <div key={i} style={{display:'flex',gap:8,padding:'5px 8px',borderRadius:4,marginBottom:3,fontSize:11,fontFamily:'var(--mono)',background:d.type==='added'?'oklch(0.16 0.04 150)':d.type==='removed'?'oklch(0.16 0.04 25)':'oklch(0.16 0.04 72)'}}>
          <span style={{color:d.type==='added'?'var(--ok)':d.type==='removed'?'var(--crit)':'var(--warn)',fontWeight:700,width:12}}>{d.type==='added'?'+':d.type==='removed'?'−':'~'}</span>
          <span style={{color:'var(--text2)'}}>{d.field}{'  '}</span>
          {d.type==='changed'&&<><span style={{color:'var(--crit)',textDecoration:'line-through'}}>{d.old}</span><span> → </span><span style={{color:'var(--ok)'}}>{d.new}</span></>}
          {d.type==='added'&&<span style={{color:'var(--ok)'}}>{d.new}</span>}
          {d.type==='removed'&&<span style={{color:'var(--crit)',textDecoration:'line-through'}}>{d.old}</span>}
        </div>
      ))}
    </div>
  </div>);
}

// ── P1 修复：DiffCompare ──────────────────────────────────────────────────
// diff 仍来自 RecheckDiffSnapshot（P0 已修复）
// 新增：issue 行可点击，展示 RecheckIssueDiffItem 详情面板
// 详情数据来自 snapshot.issue_changes，不从 Run A/B issue 列表重新推导
function DiffCompare({runs,initRunId,setNav}){
  const [runA,setRunA]=useState(initRunId||runs[0]?.id);
  const [runB,setRunB]=useState(runs[1]?.id||runs[0]?.id);
  const [selChange,setSelChange]=useState(null);

  const snapshotKey=`${runA}|${runB}`;
  const snapshot=RECHECK_DIFF_SNAPSHOTS[snapshotKey]||null;
  const ds=snapshot?.summary||null;
  const changes=snapshot?.issue_changes||[];

  // 切换 A/B 时清除选中
  useEffect(()=>setSelChange(null),[runA,runB]);

  // issue 标题索引（只用于展示，不参与 diff 计算）
  const issueIndex=Object.fromEntries([...runs.flatMap(r=>r.issues||[])].map(i=>[i.id,i]));

  return(<div className="page">
    <div className="page-header">
      <div>
        <div className="page-title">差异对比</div>
        <div className="page-sub">数据来源：RecheckDiffSnapshot · 禁止 UI 计算集合差</div>
      </div>
    </div>

    <div className="diff-run-sel">
      <div style={{flex:1}}><label>基准 Run（A）</label>
        <select className="exec-select" value={runA} onChange={e=>setRunA(e.target.value)}>
          {runs.map(r=><option key={r.id} value={r.id}>{r.id.replace('run-','')} — {r.time}</option>)}
        </select>
      </div>
      <div style={{paddingBottom:4,fontSize:18,color:'var(--text2)',flexShrink:0}}>→</div>
      <div style={{flex:1}}><label>对比 Run（B）</label>
        <select className="exec-select" value={runB} onChange={e=>setRunB(e.target.value)}>
          {runs.map(r=><option key={r.id} value={r.id}>{r.id.replace('run-','')} — {r.time}</option>)}
        </select>
      </div>
    </div>

    {!snapshot?(
      <div style={{padding:'24px 16px',background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:6,textAlign:'center'}}>
        <div style={{fontSize:13,color:'var(--text2)',fontWeight:500,marginBottom:4}}>当前 Run 配对暂无差异快照</div>
        <div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{snapshotKey}</div>
        <div style={{fontSize:11,color:'var(--text2)',marginTop:8}}>如需对比，请确保已为此配对生成 RecheckDiffSnapshot。</div>
      </div>
    ):(
      <div style={{display:'flex',gap:12,overflow:'hidden'}}>
        {/* Left: summary + table */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)',marginBottom:8}}>
            diff_id: {snapshot.diff_id} · {snapshot.base_run_id} → {snapshot.target_run_id}
          </div>
          <span className={`trend-badge ${ds.trend}`}>{TREND_LABEL[ds.trend]}</span>
          <div className="diff-stat-grid">
            <div className="diff-stat"><div className={`dsv ${ds.delta>0?'up':ds.delta<0?'dn':'eq'}`}>{ds.total_before}</div><div className="dsl">Run A 问题数</div></div>
            <div className="diff-stat"><div className={`dsv ${ds.delta>0?'up':ds.delta<0?'dn':'eq'}`}>{ds.total_after}</div><div className="dsl">Run B 问题数</div></div>
            <div className="diff-stat"><div className={`dsv ${ds.delta>0?'up':ds.delta<0?'dn':'eq'}`}>{ds.delta>0?'+':''}{ds.delta}</div><div className="dsl">变化量</div></div>
            <div className="diff-stat">
              <div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'center'}}>
                {Object.entries(ds.severity_diff||{}).map(([s,v])=>(
                  <div key={s} style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{fontSize:10,color:'var(--text2)'}}>{SEV_LABEL[s]}</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:v>0?'var(--crit)':v<0?'var(--ok)':'var(--text2)'}}>{v>0?'+':''}{v}</span>
                  </div>
                ))}
              </div>
              <div className="dsl">严重度变化</div>
            </div>
          </div>
          <div style={{marginBottom:8,fontSize:11,color:'var(--text2)',display:'flex',gap:16}}>
            {Object.entries(changes.reduce((acc,c)=>{acc[c.diff_type]=(acc[c.diff_type]||0)+1;return acc;},{})).map(([dt,cnt])=>(
              <span key={dt} style={{color:DIFF_TYPE_COLOR[dt]||'var(--text2)'}}>{DIFF_TYPE_LABEL[dt]||dt} {cnt}</span>
            ))}
          </div>
          <table className="diff-issue-table">
            <thead><tr><th>变化类型</th><th>Issue ID</th><th>问题标题</th><th>变化前</th><th>变化后</th><th>说明</th></tr></thead>
            <tbody>
              {changes.map(c=>{
                const issue=issueIndex[c.issue_id];
                const isSel=selChange?.issue_id===c.issue_id;
                return(<tr key={c.issue_id} className={`${DIFF_TYPE_CLS[c.diff_type]||''} clickable`}
                  style={{cursor:'pointer',outline:isSel?`2px solid var(--accent)`:undefined}}
                  onClick={()=>setSelChange(isSel?null:c)}>
                  <td><span style={{color:DIFF_TYPE_COLOR[c.diff_type]||'var(--text2)',fontFamily:'var(--mono)',fontSize:11}}>{DIFF_TYPE_LABEL[c.diff_type]||c.diff_type}</span></td>
                  <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{c.issue_id}</td>
                  <td style={{fontSize:12}}>{issue?.title||'—'}</td>
                  <td>{c.severity_before?<SevTag sev={c.severity_before}/>:<span style={{color:'var(--text2)',fontSize:11}}>—</span>}</td>
                  <td>{c.severity_after?<SevTag sev={c.severity_after}/>:<span style={{color:'var(--text2)',fontSize:11}}>—</span>}</td>
                  <td style={{fontSize:11,color:'var(--text2)'}}>{c.summary}</td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>

        {/* Right: RecheckIssueDiffItem detail panel */}
        {selChange&&(()=>{
          const c=selChange;
          const beforeIssue=issueIndex[c.issue_id];
          return(<div style={{width:300,flexShrink:0,background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:6,padding:'12px 14px',overflow:'auto',maxHeight:'70vh'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text0)'}}>RecheckIssueDiffItem</div>
              <button style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}} onClick={()=>setSelChange(null)}>×</button>
            </div>
            {setNav&&<button className="btn btn-secondary btn-sm" style={{width:'100%',marginBottom:10}} onClick={()=>{
              setNav({section:'analysis',sub:'workbench',ctx:{
                runId:snapshot.target_run_id,
                drilldown:{
                  source:'recheck_diff',
                  diff_id:snapshot.diff_id,
                  from_run_id:snapshot.base_run_id,
                  to_run_id:snapshot.target_run_id,
                  run_id:snapshot.target_run_id,
                  issue_id:c.issue_id,
                  diff_type:c.diff_type,
                  issue_diff_item:c
                }
              }});
            }}>◈ 查看 Workbench 详情</button>}
            <div className="kv-grid" style={{marginBottom:10}}>
              <span className="kk">issue_id</span><span className="vv">{c.issue_id}</span>
              <span className="kk">diff_type</span><span className="vv" style={{color:DIFF_TYPE_COLOR[c.diff_type]}}>{c.diff_type}</span>
              <span className="kk">severity_before</span><span className="vv">{c.severity_before||'—'}</span>
              <span className="kk">severity_after</span><span className="vv">{c.severity_after||'—'}</span>
            </div>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--text2)',marginBottom:4}}>summary</div>
            <div style={{fontSize:12,color:'var(--text1)',marginBottom:10}}>{c.summary}</div>
            {beforeIssue&&<>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--text2)',marginBottom:4}}>before_issue 摘要</div>
              <div style={{background:'var(--bg2)',borderRadius:4,padding:'8px 10px',marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:500,color:'var(--text0)',marginBottom:4}}>{beforeIssue.title}</div>
                <div className="kv-grid">
                  <span className="kk">rule_id</span><span className="vv">{beforeIssue.rule_id}</span>
                  <span className="kk">anchor_id</span><span className="vv">{beforeIssue.anchor_id}</span>
                  <span className="kk">source_device</span><span className="vv">{beforeIssue.source_device}</span>
                </div>
              </div>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--text2)',marginBottom:4}}>after_issue 摘要</div>
              <div style={{background:'var(--bg2)',borderRadius:4,padding:'8px 10px'}}>
                {c.diff_type==='resolved'?
                  <div style={{fontSize:12,color:'var(--ok)'}}>本次运行未检出 · 来源 run 不含此 issue</div>:
                  <div style={{fontSize:12,color:'var(--text1)'}}>{c.diff_type==='new'?'首次出现':'仍然存在 · 见 Run B 结果'}</div>
                }
              </div>
            </>}
          </div>);
        })()}
      </div>
    )}
  </div>);
}
// App
function App(){
  const [nav,setNav]=useState(()=>{try{const s=localStorage.getItem('tc_nav_v2');return s?JSON.parse(s):{section:'baseline',sub:'list',ctx:{}}}catch{return{section:'baseline',sub:'list',ctx:{}}}});
  const [runs,setRuns]=useState(INIT_RUNS);
  const [selectedRun,setSelectedRun]=useState(INIT_RUNS[0]);
  function navigate(n){setNav(n);localStorage.setItem('tc_nav_v2',JSON.stringify(n))}
  function handleRunComplete(newRun){setRuns(rs=>[newRun,...rs]);setSelectedRun(newRun);navigate({section:'analysis',sub:'workbench',ctx:{runId:newRun.id}})}
  function renderContent(){
    const {section,sub,ctx}=nav;
    if(section==='baseline'){
      if(sub==='list')return<BaselineList setNav={navigate}/>;
      if(sub==='detail')return<BaselineDetail blId={ctx.blId||BASELINES[0].id} setNav={navigate}/>;
      if(sub==='rules')return<RuleEditor blId={ctx.blId||BASELINES[0].id}/>;
      if(sub==='versions')return<VersionMgmt blId={ctx.blId||BASELINES[0].id}/>;
    }
    if(section==='execution'){
      if(sub==='config')return<ExecutionConfig blId={ctx.blId} onRunComplete={handleRunComplete}/>;
      if(sub==='history')return<RunHistory runs={runs} setNav={navigate} setSelectedRun={setSelectedRun}/>;
    }
    if(section==='analysis'){
      const run=ctx.runId?runs.find(r=>r.id===ctx.runId)||selectedRun:selectedRun;
      return<AnalysisWorkbench run={run} setNav={navigate} drilldown={ctx.drilldown||null}/>;
    }
    if(section==='diff')return<DiffCompare runs={runs} initRunId={ctx.runId} setNav={navigate}/>;
    return<div className="empty"><div className="et">未知页面</div></div>;
  }
  const curSection=NAV.find(n=>n.id===nav.section);
  const curSub=curSection?.subs?.find(s=>s.id===nav.sub);
  return(<div className="shell">
    <div className="topbar">
      <span className="topbar-logo">TopoChecker</span>
      <div className="topbar-sep"/>
      <div className="topbar-breadcrumb">
        <span>{curSection?.label}</span>
        {curSub&&<><span style={{color:'var(--border-hi)'}}>/</span><span className="bc-cur">{curSub.label}</span></>}
      </div>
      <div className="topbar-spacer"/>
      <span className="topbar-badge">{runs.length} 次运行</span>
    </div>
    <div className="leftnav">
      {NAV.map(sec=>(
        <React.Fragment key={sec.id}>
          <div className={`nav-item ${nav.section===sec.id?'active':''}`} onClick={()=>navigate({section:sec.id,sub:sec.subs[0].id,ctx:{}})}>
            <span className="ni-icon">{sec.icon}</span><span className="ni-label">{sec.label}</span>
          </div>
          {nav.section===sec.id&&sec.subs.map(sub=>(
            <div key={sub.id} className={`nav-sub ${nav.sub===sub.id?'active':''}`} onClick={()=>navigate({section:sec.id,sub:sub.id,ctx:nav.ctx})}>{sub.label}</div>
          ))}
        </React.Fragment>
      ))}
    </div>
    <div className="content">{renderContent()}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
