name: Frontend-Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend Typecheck
        run: cd frontend && npm run typecheck

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Frontend Prototype Freeze
        run: bash scripts/check_frontend_prototype_freeze.sh

      - name: Frontend Componentization
        run: bash scripts/check_frontend_componentization_phase1.sh

      - name: Frontend Typecheck Baseline
        run: bash scripts/check_frontend_typecheck_baseline.sh

      - name: Backend API Skeleton
        run: bash scripts/check_backend_api_skeleton.sh

  smoke-and-snapshots:
    name: Smoke & Snapshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend Typecheck
        run: cd frontend && npm run typecheck

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Start Backend
        run: |
          cd backend
          nohup python3 -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 --app-dir . &
          echo "Waiting for backend to start..."
          sleep 5

      - name: Verify Backend
        run: curl -f http://127.0.0.1:8000/health

      - name: Smoke Test
        run: bash scripts/smoke_frontend_backend_local.sh

      - name: API Contract Snapshots
        run: bash scripts/check_backend_api_contract_snapshots.sh

      - name: Stop Backend
        if: always()
        run: pkill -f "uvicorn.*backend.main:app" || true
