architecture_audit:
  current_phase: "RULE_ENGINE_RUNTIME_EXTERNALIZATION_SINGLE_FACT"
  five_layer_status: "Aligned with strict 5-layer architecture. No cross-layer contamination."
  application_split_status: "Services are cleanly split by responsibility (Task, Recognition, Normalization, CheckRun, Query, Export, RuleGovernance, RuleEditor)."
  task_model_status: "CheckTask fully implemented with all required statuses."
  crosscutting_status: "Minimal capabilities (logging, errors, ids, config, time) implemented."
  result_pipeline_status: "6-layer structured result models defined, populated with real Excel data, and persisted."
  cli_status: "Full CLI implemented covering all lifecycle commands."
  ui_status: "Local Web UI implemented using FastAPI+Jinja2. Features read-only Governance and MVP Rule Editor (Validate, Preview, Save Draft, Publish)."
  ui_ready_decision: "System is stable and ready for UI iteration. No direct Domain/Repository access from Presentation."

rule_externalization_status:
  completed_features:
    - "RuleDefinition serializable model extended with domain boundaries (engine_scope, applies_to)"
    - "RuleDefinitionConverter to runtime RowConstraint"
    - "InputContractConfig source tracking (source_type, source_name)"
    - "RuleDefinitionLoader for loading from JSON files"
    - "RuleDefinitionRegistry upgraded to multi-domain aware (filters by engine_scope and applies_to)"
    - "ContractBuilder to dynamically assemble contract with external rules"
    - "Proof of concept for mapping RuleEngine macroscopic rules (single_fact, topology) to RuleDefinition"
    - "RuleEngine runtime externalization: SingleFact can execute external compiled rules sourced from RuleDefinitionRegistry"
  supported_rule_types:
    - "field_equals"
    - "field_not_equals"
    - "if_field_equals_then_required"
  limitations:
    - "Complex boolean logic trees not yet supported"
    - "HeaderMapping.normalize_fn is not externalized"
    - "RuleEngine GroupConsistency/Topology/Threshold are not externalized at runtime yet (still baseline.rule_set only)"
  next_steps:
    - "Introduce a lightweight boolean logic DSL (e.g. AND/OR tree)"
    - "Promote runtime externalization to baseline loading: feed RuleDefinitionRegistry rules into RuleEngine without test-only wiring"
    - "Externalize runtime for Topology/Threshold/GroupConsistency executors in the same pattern (scope + compiler)"
