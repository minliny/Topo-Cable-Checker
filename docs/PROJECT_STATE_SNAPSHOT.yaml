architecture_summary:
  pattern: "DDD Layered (Domain-Driven Design)"
  layers:
    domain:
      path: "src/domain/"
      key_classes:
        - "RuleCompiler (rule_compiler.py:84-278) — 编译 DSL/Template 规则"
        - "CompiledRule (compiled_rule.py:9-75) — 编译后规则模型+校验"
        - "RuleEngine (engine.py:16-128) — 编译→校验→作用域→分发"
        - "4 Executors: SingleFactExecutor, GroupConsistencyExecutor, ThresholdExecutor, TopologyExecutor"
      protocols:
        - "IBaselineRepository (interfaces.py:10-13)"
        - "ITaskRepository (interfaces.py:15-17)"
        - "IResultRepository (interfaces.py:19-35)"
        - "IExcelReader (interfaces.py:37-38)"
    application:
      path: "src/application/"
      key_services:
        - "BaselineService (baseline_services/) — 基线列表+默认创建"
        - "RulePublishWorkflowService (rule_editor_services/) — compile→validate→persist"
        - "RuleBaselineHistoryService (rule_editor_services/) — 版本列表/diff/rollback + B1: Deep Diff 递归比较 + B2: 空 rule_set 回滚修复"
        - "RuleEditorGovernanceBridgeService (rule_editor_services/) — 编译桥接"
        - "RuleEditorMVPService (rule_editor_services/) — 表单驱动MVP"
        - "RuleDraftSaveService (rule_editor_services/) — A1: Draft 保存/加载/清除"
        - "RuleDraftValidator (rule_editor_services/) — Schema 驱动校验"
        - "RuleDraftSchemaBuilder (rule_editor_services/) — Schema 构建"
        - "CheckRunService, RecognitionService, TaskService, etc. (9 other service dirs)"
    infrastructure:
      path: "src/infrastructure/"
      key_classes:
        - "BaselineRepository (repository.py) — + schema migration v0→v1.0→v1.1→v1.2"
        - "TaskRepository (repository.py:417-432)"
        - "ResultRepository (repository.py:434-534)"
        - "ExcelReader (excel_reader.py:5-39)"
    presentation:
      path: "src/presentation/"
      key_classes:
        - "FastAPI app (api/main.py:6-32) — 2 routers + CORS + middleware"
        - "baselines router (api/routers/baselines.py) — GET baselines/versions/diff"
        - "rules router (api/routers/rules.py) — POST validate/publish/rollback"
        - "error_handler (api/error_handler.py) — 全局异常+RequestIdMiddleware"
        - "CLI (cli/main.py:34-234) — 10+ commands"
    crosscutting:
      path: "src/crosscutting/"
      key_classes:
        - "ErrorCode (errors/exceptions.py:16-46) — P1xxx/D2xxx/I3xxx/A4xxx/X9000"
        - "CheckToolBaseError hierarchy (errors/exceptions.py:48-127)"
        - "RotatingFileHandler logger (logging/logger.py:24-63) — 5MB×3"

frontend_summary:
  framework: "React + TypeScript + Ant Design + Vite"
  state_management: "useReducer (25 action types — +DRAFT_SAVE_SUCCESS/DRAFT_SAVE_FAILED/DRAFT_LOADED)"
  key_components:
    - "App.tsx — 三栏布局 + 事件处理"
    - "pageReducer.ts — 状态机"
    - "RuleEditor.tsx — rule_type select + params JSON TextArea"
    - "BaselineList.tsx — 左侧导航树"
    - "RightPanel.tsx — 校验结果/Diff摘要/版本元数据"
