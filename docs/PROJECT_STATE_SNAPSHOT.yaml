architecture_summary:
  pattern: "DDD Layered (Domain-Driven Design)"
  layers:
    domain:
      path: "src/domain/"
      key_classes:
        - "RuleCompiler (rule_compiler.py) — 编译 DSL/Template 规则到 CompiledRule dataclass"
        - "CompiledRule (compiled_rule_schema.py) — 简洁 dataclass 编译后规则模型"
        - "RuleEngine (engine.py) — 编译→作用域→分发→外部规则注入"
        - "4 Executors: SingleFactExecutor, GroupConsistencyExecutor, ThresholdExecutor, TopologyExecutor"
        - "ExecutionContext (rule_engine/execution_context.py) — 执行上下文"
        - "ParameterSchemaRegistry, RuleMetaRegistry, RuleCapabilityRegistry (rule_engine/)"
      protocols:
        - "IBaselineRepository (interfaces.py)"
        - "ITaskRepository (interfaces.py)"
        - "IResultRepository (interfaces.py)"
        - "IExcelReader (interfaces.py)"
    application:
      path: "src/application/"
      key_services:
        - "BaselineService — 基线列表+默认创建"
        - "RulePublishWorkflowService — compile→validate→persist"
        - "RuleBaselineHistoryService — 版本列表/diff/rollback + Deep Diff"
        - "CheckRunService — 支持 external_rule_file_path 外部规则注入"
        - "RecognitionService — Input Contract 驱动的识别（header mapping + validation）"
        - "NormalizationService — Contract 驱动的规范化（row constraints + type validation）"
        - "RuleEngineExternalRuleAssembler — 外部规则组装注入"
        - "RuleDraftSaveService — Draft 保存/加载/清除"
        - "ContractBuilder, RuleDefinitionRegistry, RuleDefinitionLoader — 规则外部化链路"
    infrastructure:
      path: "src/infrastructure/"
      key_classes:
        - "BaselineRepository — + schema migration v0→v1.0→v1.1→v1.2"
        - "TaskRepository, ResultRepository"
        - "ExcelReader"
    presentation:
      path: "src/presentation/"
      key_classes:
        - "FastAPI app — 2 routers + CORS + middleware"
        - "CLI (cli/main.py) — 10+ commands"
    crosscutting:
      path: "src/crosscutting/"
      key_classes:
        - "ErrorCode, CheckToolBaseError hierarchy"
        - "RotatingFileHandler logger"

rule_externalization_status:
  completed_features:
    - "CompiledRule dataclass (compiled_rule_schema.py) — 统一编译后规则模型"
    - "RuleTarget + RuleMessage dataclasses"
    - "InputContractConfig with header mapping, row constraints, type validation, enum validation"
    - "RecognitionService _apply_contract — full header mapping + validation pipeline"
    - "NormalizationService _validate_and_normalize_row — type/enum/constraint validation"
    - "RuleDefinitionLoader, RuleDefinitionRegistry, ContractBuilder — 外部规则加载与组装"
    - "RuleEngineExternalRuleAssembler — 外部规则组装注入到 CheckRunService"
    - "SingleFactRuleCompiler, ThresholdRuleCompiler — 外部规则编译器"
    - "CheckRunService 支持 external_rule_file_path 参数"
  supported_rule_types:
    - "field_equals"
    - "field_not_equals"
    - "regex_match"
    - "missing_value"
    - "threshold / threshold_check"
    - "group_consistency"
    - "topology / topology_assertion"
  supported_engine_scopes:
    - "normalization"
    - "rule_engine_single_fact"
    - "rule_engine_threshold"
  limitations:
    - "Complex boolean logic trees not yet supported"
    - "HeaderMapping.normalize_fn is not externalized"
    - "RuleEngine GroupConsistency/Topology are not externalized at runtime yet"

